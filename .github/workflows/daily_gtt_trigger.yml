name: Daily GTT Creation (Pre-Market)

on:
  schedule:
    # 8:30 AM IST = 03:00 UTC, Monday to Friday
    # NOTE: intentionally 30 min after generate_ma_data (02:30 UTC) to avoid
    # GitHub dropping one when two workflows fire at the exact same second.
    - cron: '0 3 * * 1-5'
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI for testing

jobs:
  trigger-gtt:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wake up Render app
        run: |
          echo "Pinging app to wake up Render dyno..."
          curl -s --max-time 60 \
            -H "X-Trigger-Token: ${{ secrets.GTT_TRIGGER_TOKEN }}" \
            https://stock-dashboard-project.onrender.com/api/health || true

      - name: Wait for app to fully start and load signals
        run: |
          echo "Waiting 90 seconds for app startup + yfinance data load..."
          sleep 90

      - name: Verify app is ready
        run: |
          RESPONSE=$(curl -s --max-time 30 \
            -H "X-Trigger-Token: ${{ secrets.GTT_TRIGGER_TOKEN }}" \
            https://stock-dashboard-project.onrender.com/api/health)
          echo "Health check: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','error'))")
          if [ "$STATUS" != "ok" ]; then
            echo "App not ready after startup. Aborting."
            exit 1
          fi
          SIGNALS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('v20_signals',0))")
          echo "V20 signals loaded: $SIGNALS"

      - name: Trigger GTT job
        run: |
          echo "Triggering pre-market GTT creation..."
          HTTP_CODE=$(curl -s -o /tmp/gtt_response.json -w "%{http_code}" --max-time 120 \
            -X POST \
            -H "X-Trigger-Token: ${{ secrets.GTT_TRIGGER_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://stock-dashboard-project.onrender.com/api/run-gtt)

          echo "=== GTT Job Log ==="
          python3 -c "
          import json
          try:
              d = json.load(open('/tmp/gtt_response.json'))
              for line in d.get('logs', []):
                  print(line)
          except Exception as e:
              print('Could not parse response:', e)
          "

          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "400" ]; then
            echo ""
            echo "KITE TOKEN EXPIRED — Please open your dashboard and reconnect Zerodha."
            echo "URL: https://stock-dashboard-project.onrender.com"
            exit 1
          elif [ "$HTTP_CODE" != "200" ]; then
            echo "GTT job failed with HTTP $HTTP_CODE"
            exit 1
          else
            echo "GTT job completed successfully."
          fi
