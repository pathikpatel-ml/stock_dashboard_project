name: Daily GTT Creation (Pre-Market)

on:
  schedule:
    # 7:55 AM IST = 02:25 UTC — first wake-up ping
    - cron: '25 2 * * 1-5'
    # 8:25 AM IST = 02:55 UTC — second wake-up ping (Render sleeps after 15 min)
    - cron: '55 2 * * 1-5'
    # 9:05 AM IST = 03:35 UTC — safety-net GTT run (idempotent fallback)
    - cron: '35 3 * * 1-5'
  workflow_dispatch:   # manual trigger from GitHub Actions UI

jobs:
  trigger-gtt:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Determine job type
        id: job_type
        run: |
          MINUTE=$(date -u +"%M")
          HOUR=$(date -u +"%H")
          # 02:25 and 02:55 UTC = wake-up only; 03:35 UTC = GTT run
          if [ "$HOUR" = "03" ] && [ "$MINUTE" -ge "30" ]; then
            echo "type=gtt_run" >> $GITHUB_OUTPUT
          else
            echo "type=wake_up" >> $GITHUB_OUTPUT
          fi

      - name: Wake up Render dyno
        run: |
          echo "Pinging app to wake Render dyno..."
          curl -sf --max-time 60 \
            -H "X-Trigger-Token: ${{ secrets.GTT_TRIGGER_TOKEN }}" \
            https://stock-dashboard-project.onrender.com/api/health || true
          echo "Wake ping sent."

      - name: Wait for app data to be ready
        if: steps.job_type.outputs.type == 'gtt_run'
        run: |
          echo "Waiting for app startup + data load..."
          MAX_ATTEMPTS=18
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(curl -sf --max-time 15 \
              -H "X-Trigger-Token: ${{ secrets.GTT_TRIGGER_TOKEN }}" \
              https://stock-dashboard-project.onrender.com/api/ready \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','loading'))" \
              2>/dev/null || echo "loading")
            if [ "$STATUS" = "ready" ]; then
              echo "App is ready (attempt $i/$MAX_ATTEMPTS)."
              break
            fi
            echo "Still loading... attempt $i/$MAX_ATTEMPTS — sleeping 10s"
            sleep 10
          done
          # Final check — if still not ready, abort
          STATUS=$(curl -sf --max-time 15 \
            -H "X-Trigger-Token: ${{ secrets.GTT_TRIGGER_TOKEN }}" \
            https://stock-dashboard-project.onrender.com/api/ready \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','loading'))" \
            2>/dev/null || echo "loading")
          if [ "$STATUS" != "ready" ]; then
            echo "ERROR: App did not become ready within 3 minutes. Aborting GTT run."
            exit 1
          fi

      - name: Trigger GTT job
        if: steps.job_type.outputs.type == 'gtt_run'
        run: |
          echo "Triggering pre-market GTT creation..."
          HTTP_CODE=$(curl -s -o /tmp/gtt_response.json -w "%{http_code}" --max-time 120 \
            -X POST \
            -H "X-Trigger-Token: ${{ secrets.GTT_TRIGGER_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://stock-dashboard-project.onrender.com/api/run-gtt)

          echo "=== GTT Job Log ==="
          python3 -c "
          import json
          try:
              d = json.load(open('/tmp/gtt_response.json'))
              for line in d.get('logs', []):
                  print(line)
          except Exception as e:
              print('Could not parse response:', e)
          "

          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "400" ]; then
            echo ""
            echo "KITE TOKEN EXPIRED — Please open your dashboard and reconnect Zerodha."
            echo "URL: https://stock-dashboard-project.onrender.com"
            exit 1
          elif [ "$HTTP_CODE" != "200" ]; then
            echo "GTT job failed with HTTP $HTTP_CODE"
            exit 1
          else
            echo "GTT job completed successfully."
          fi

      - name: Wake-up only (no GTT run)
        if: steps.job_type.outputs.type == 'wake_up'
        run: |
          echo "Wake-up ping complete. Dyno is awake for scheduled GTT run."
