name: Weekly Stock Screening

on:
  schedule:
    # Run every Sunday at 6:00 AM IST (00:30 UTC)
    - cron: '30 0 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-stock-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Configure Git User
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate weekly stock list
      run: |
        python generate_weekly_stock_list.py

    - name: Commit and push stock list
      run: |
        git add Master_company_market_trend_analysis.csv NSE_EQ_All_Stocks_Analysis.csv nse_categories.csv 2>/dev/null || true
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Weekly stock list update $(date +%Y%m%d)"
          git pull --rebase origin main
          git push
        fi
