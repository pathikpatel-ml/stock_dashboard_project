name: Generate Yearly Fundamentals

on:
  schedule:
    - cron: '0 1 1 * *'
  workflow_dispatch:
    inputs:
      sample_size:
        description: 'Sample size for parser validation before full run'
        required: false
        default: '5'
      run_full:
        description: 'Run full generation after sample validation'
        required: false
        default: 'true'

jobs:
  generate-yearly-fundamentals:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Configure Git User
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"

    - name: Run parser sample validation
      env:
        SAMPLE_SIZE: ${{ github.event.inputs.sample_size || '5' }}
      run: |
        python generate_fundamentals_yearly.py --sample-size "$SAMPLE_SIZE" --output output/stock_fundamentals_yearly_sample.csv --min-successful-symbols 1

    - name: Run focused tests
      run: |
        pytest tests/test_generate_fundamentals_yearly.py tests/test_strategy_engine.py -q

    - name: Generate full yearly fundamentals dataset
      if: ${{ github.event_name == 'schedule' || github.event.inputs.run_full != 'false' }}
      run: |
        python generate_fundamentals_yearly.py --output stock_fundamentals_yearly.csv --min-successful-symbols 10

    - name: Commit and push dataset updates
      if: ${{ github.event_name == 'schedule' || github.event.inputs.run_full != 'false' }}
      run: |
        git add stock_fundamentals_yearly.csv output/stock_fundamentals_yearly_sample.csv
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Automated yearly fundamentals refresh"
          git push
        fi
